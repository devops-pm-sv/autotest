trigger:
- master

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  jobs:
  - job: Build
    steps:
      - script: echo "Building..."

- stage: Approval
  displayName: "Manual Approval"
  dependsOn: Build
  jobs:
  - job: WaitForApproval
    pool: server
    steps:
      - task: ManualValidation@0
        timeoutInMinutes: 60
        inputs:
          notifyUsers: 'zhoubo_52@163.com'
          instructions: 'Please review the build results before approving deployment.'
          onTimeout: 'reject'

- stage: Deploy
  displayName: "Deploy to Production"
  dependsOn: Approval
  jobs:
  - job: Deploy
    steps:
      - script: echo "Deploying..."
